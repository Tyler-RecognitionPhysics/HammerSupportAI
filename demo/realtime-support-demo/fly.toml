# Fly.io persistent host for HubSpot ticket sync + KB artifacts.
# Deploy from HAMMERFINALSITE root:
#   .\scripts\deploy-fly-support-sync.ps1

app = "hammer-support-sync"
primary_region = "iad"

[build]
  dockerfile = "server/Dockerfile"
  context = "../.."

[env]
  # The bundled developer .env must not override these machine paths.
  SUPPORT_SKIP_DOTENV = "1"
  SUPPORT_REPO_ROOT = "/app"
  # Live playbook lives on the volume so dashboard edits survive redeploys.
  # Serverless (Vercel) instances pull this file so voice + chat ground on it.
  SUPPORT_PLAYBOOK_MD = "/data/playbook/approved.md"
  SUPPORT_DATA_DIR = "/data"
  SUPPORT_RAW_DIR = "/data/raw/support-data"
  SUPPORT_KB_DB = "/data/support_kb.sqlite"
  SUPPORT_HUBSPOT_TICKETS_STATE_DB = "/data/hubspot_tickets_sync.sqlite"
  # Dashboard store (sessions, callbacks, tickets, settings) must live on the
  # volume — it is the durable source of truth the Vercel deployment proxies to.
  SUPPORT_DASHBOARD_DB = "/data/support_dashboard.sqlite"
  # Automatic daily HubSpot ticket sync (incremental). 0 disables.
  SUPPORT_AUTO_SYNC_INTERVAL_HOURS = "24"

[mounts]
  source = "support_sync_data"
  destination = "/data"

[http_service]
  internal_port = 8782
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "2048mb"
  cpu_kind = "shared"
  cpus = 1
